- name: Installs postgresql server
  hosts:
    - database_postgresql
  gather_facts: false
  vars_files:
    - variables/vars.yml
    - variables/provision.yml
 
  handlers:
    - name: 'Restart postgresql'
      ansible.builtin.service:
        name: postgresql-14
        state: restarted
    
  pre_tasks:
                
    - name: 'Upgrade all packages'
      ansible.builtin.yum: name=* state=latest  
           
  tasks: 
  
    - name: 'Remove postgresql'
      yum:
        name: postgresql
        state: absent  

    - name: Add postgresql repository
      ansible.builtin.yum_repository:
        name: postgresql
        description: postgresql 14
        baseurl: https://download.postgresql.org/pub/repos/yum/14/redhat/rhel-7-x86_64  

    - name: 'Install postgresql packages'
      ansible.builtin.yum:
        update_cache: true
        disable_gpg_check: true
        state: 'present'      
        name:
          - postgresql14 
          - postgresql14-server       
          
    - name: 'Install Python packages that allows Ansible modules to interact with the database'
      ansible.builtin.pip: "name={{ item }}  state=present"
      with_items:
        - psycopg2-binary  
                
    - name: 'Find out if PostgreSQL is initialized'
      ansible.builtin.stat:
        path: "/var/lib/pgsql/data/pg_hba.conf"
      register: postgres_data

    - name: 'Initialize PostgreSQL'
      ansible.builtin.shell: "/usr/pgsql-14/bin/postgresql-14-setup initdb"
      when: not postgres_data.stat.exists
      
    - name: 'Starting postgresql services'
      ansible.builtin.service:
        name: postgresql-14
        state: started
        enabled: true
      
    - name: 'Allow remote connection'
      ansible.builtin.lineinfile:
         path: "/var/lib/pgsql/14/data/postgresql.conf"
         regexp: "#listen_addresses = 'localhost'*" 
         line: "listen_addresses = '*'"
         owner: postgres
         group: postgres
         mode: '0644'    
      become: true
      become_user: root     
       
    - name: "Allow md5 connection"
      community.general.postgresql_pg_hba:
        dest: "/var/lib/pgsql/14/data/pg_hba.conf"
        contype: host
        databases: all
        source: "0.0.0.0/0"
        method: md5
        users: all
        create: true
      become: true
      become_user: postgres
      notify: Restart postgresql  
            
    - name: 'Restart postgresql'
      meta: flush_handlers  
